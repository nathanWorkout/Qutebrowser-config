<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>startpage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">

  <div class="main">
    <div class="wallpaper"></div>
    <div class="clock-block">
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="date">—</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="s-links">
      <div class="s-group">
        <div class="s-label">dev</div>
        <a class="link-item" href="https://github.com">GitHub</a>
        <a class="link-item" href="https://wiki.osdev.org/">OS dev wiki</a>
        <a class="link-item" href="https://wiki.archlinux.org">Arch wiki</a>
      </div>
      <div class="s-group">
        <div class="s-label">social</div>
        <a class="link-item" href="https://linkedin.com">LinkedIn</a>
        <a class="link-item" href="https://mail.google.com">Gmail</a>
        <a class="link-item" href="https://discord.com/app">Discord</a>
        <a class="link-item" href="https://www.reddit.com">Reddit</a>
      </div>
      <div class="s-group">
        <div class="s-label">learn</div>
        <a class="link-item" href="https://youtube.com">YouTube</a>
        <a class="link-item" href="https://claude.ai">Claude</a>
        <a class="link-item" href="https://chatgpt.com">ChatGPT</a>
        <a class="link-item" href="https://vim-adventures.com">Vim Adventures</a>
      </div>
    </div>

    <div class="s-search">
      <div class="search-wrap">
        <input class="search-input" id="search" autocomplete="off" autofocus />
      </div>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
